services:
  # ─────────────────────────────────────────────
  # PostgreSQL – local dev only
  # When deploying to cloud use existing AWS RDS
  # by overriding DATABASE_URL in .env
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: whizsuite_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pranav}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pranav} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - local  # Only starts when --profile local is used

  # ─────────────────────────────────────────────
  # Redis – session / BullMQ queues
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whizsuite_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend – Node.js / Express / Prisma
  # ─────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: whizsuite_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      # When using local Postgres (--profile local), override the DATABASE_URL
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 90s

  # ─────────────────────────────────────────────
  # Frontend – Next.js 14 (standalone build)
  # ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: whizsuite_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    depends_on:
      server:
        condition: service_healthy

  # Nginx – reverse proxy on port 80 for direct access (http://IP)
  nginx:
    image: nginx:alpine
    container_name: whizsuite_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
